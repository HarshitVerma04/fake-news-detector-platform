# nginx/satyaparichay.conf
#
# Nginx reverse proxy config for SatyaParichay.
# Handles HTTPS termination and proxies to FastAPI + React.
#
# SETUP INSTRUCTIONS:
#
# 1. Install Nginx:
#      sudo apt install nginx          # Ubuntu/Debian
#
# 2. Install Certbot for free SSL certificates:
#      sudo apt install certbot python3-certbot-nginx
#
# 3. Obtain a certificate (replace yourdomain.com):
#      sudo certbot --nginx -d yourdomain.com
#
# 4. Copy this file:
#      sudo cp nginx/satyaparichay.conf /etc/nginx/sites-available/satyaparichay
#      sudo ln -s /etc/nginx/sites-available/satyaparichay /etc/nginx/sites-enabled/
#
# 5. Test and reload:
#      sudo nginx -t
#      sudo systemctl reload nginx
#
# For local HTTPS (development), use mkcert:
#      choco install mkcert            # Windows
#      mkcert -install
#      mkcert localhost 127.0.0.1
# Then update ssl_certificate paths below.

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL certificates (managed by Certbot or mkcert)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # Strong SSL settings
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            SAMEORIGIN                            always;
    add_header X-Content-Type-Options     nosniff                               always;
    add_header X-XSS-Protection           "1; mode=block"                       always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;

    # Gzip compression
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    # ── FastAPI backend (/api/v1/* and /docs) ──────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        # Rate limiting at Nginx level (second layer on top of slowapi)
        limit_req zone=api_limit burst=20 nodelay;
    }

    location /docs {
        proxy_pass http://127.0.0.1:8000/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000/openapi.json;
        proxy_set_header Host $host;
    }

    # ── React frontend (everything else) ───────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5173;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_http_version 1.1;
    }
}

# Rate limiting zone — define in nginx.conf http block, not here
# Add this to /etc/nginx/nginx.conf inside the http {} block:
#   limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
